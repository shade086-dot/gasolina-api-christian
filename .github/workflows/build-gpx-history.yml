name: Build GPX history

on:
  push:
    branches:
      - main
    paths:
      - 'gpx_historial/**'
      - 'build_gpx_history.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-gpx-history:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate GPX history files
        run: python build_gpx_history.py

      - name: Commit regenerated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/rutas_indice.json static/rutas_resumen.txt static/rutas_mapa.html
          if git diff --cached --quiet; then
            echo "No GPX history changes to commit."
          else
            git commit -m "Actualiza historial GPX generado"
            git push
          fi
